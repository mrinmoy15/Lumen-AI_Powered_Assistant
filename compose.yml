services:

  # -- PostgreSQL + pgvector -------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: lumen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -- FastAPI backend -------------------------------------------
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/lumen
    depends_on:
      postgres:
        condition: service_healthy

  # -- React frontend (nginx) ------------------------------------
  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    environment:
      # Browser reaches backend via the host-exposed port
      BACKEND_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
