services:

  # ── PostgreSQL + pgvector ─────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: lumen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ───────────────────────────────────────────
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override DATABASE_URL so the backend reaches postgres by service name, not localhost
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/lumen
      BACKEND_URL: http://backend:8000
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "python -m uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8000}"]

  # ── Streamlit frontend ────────────────────────────────────────
  frontend:
    build: .
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      # Frontend talks to the backend service by name inside the Docker network
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    command: ["sh", "-c", "python -m streamlit run app.py --server.port ${PORT:-8501} --server.address 0.0.0.0"]

volumes:
  postgres_data:
